<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Laser Turret Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #0d0d14;
    border-bottom: 1px solid #1a1a2e;
  }
  #header h1 { font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #ff3c3c; }
  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; display: inline-block; margin-right: 8px; transition: background 0.3s; }
  #status-dot.connected { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
  #status-dot.tracking  { background: #ff3c3c; box-shadow: 0 0 8px #ff3c3c; }
  #status-dot.error     { background: #ff8800; }
  #status-label { font-size: 11px; color: #666; letter-spacing: 1px; }
  #setup-panel { padding: 16px; background: #0d0d14; border-bottom: 1px solid #1a1a2e; }
  .field-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .field-row label { font-size: 11px; color: #666; letter-spacing: 1px; min-width: 70px; }
  .field-row input {
    flex: 1; background: #111120; border: 1px solid #222240; color: #e0e0e0;
    padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 13px; border-radius: 4px; outline: none;
  }
  .field-row input:focus { border-color: #ff3c3c; }
  #connect-btn {
    width: 100%; padding: 10px; background: #ff3c3c; color: #0a0a0f; border: none;
    font-family: 'Courier New', monospace; font-weight: 700; font-size: 12px;
    letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: background 0.2s, opacity 0.2s;
  }
  #connect-btn:hover { background: #ff6060; }
  #connect-btn:disabled { opacity: 0.4; cursor: default; }
  #viewport { position: relative; width: 100%; background: #000; }
  #camera { width: 100%; display: block; transform: scaleX(-1); }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
  #crosshair { position: absolute; width: 24px; height: 24px; pointer-events: none; transform: translate(-50%, -50%); display: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #ff3c3c; }
  #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
  #crosshair::after  { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
  #infobar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #1a1a2e; border-top: 1px solid #1a1a2e; }
  .info-cell { background: #0d0d14; padding: 10px 6px; text-align: center; }
  .info-cell .val { font-size: 18px; font-weight: 700; color: #ff3c3c; display: block; line-height: 1; }
  .info-cell .lbl { font-size: 9px; color: #444; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; display: block; }
  #controls { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ctrl-card { background: #0d0d14; border: 1px solid #1a1a2e; border-radius: 6px; padding: 12px; }
  .ctrl-card h3 { font-size: 9px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .slider-row label { font-size: 10px; color: #666; min-width: 16px; }
  .slider-row input[type=range] { flex: 1; accent-color: #ff3c3c; height: 3px; }
  .slider-row span { font-size: 11px; color: #e0e0e0; min-width: 28px; text-align: right; }
  #laser-toggle {
    width: 100%; padding: 9px; background: #111120; border: 1px solid #ff3c3c; color: #ff3c3c;
    font-family: 'Courier New', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px;
    border-radius: 4px; cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  #laser-toggle.on { background: #ff3c3c; color: #0a0a0f; }
  #start-btn {
    grid-column: span 2; padding: 13px; background: #111120; border: 1px solid #333360; color: #8888cc;
    font-family: 'Courier New', monospace; font-weight: 700; font-size: 12px;
    letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all 0.2s;
  }
  #start-btn.active { background: #ff3c3c22; border-color: #ff3c3c; color: #ff3c3c; }
  #log {
    margin: 0 16px 16px; background: #0d0d14; border: 1px solid #1a1a2e;
    border-radius: 6px; padding: 10px; font-size: 10px; color: #444; height: 70px; overflow-y: auto; line-height: 1.6;
  }
  #log .ok  { color: #00ff88; }
  #log .err { color: #ff8800; }
  #log .inf { color: #6666cc; }
  #loading {
    position: absolute; inset: 0; background: #0a0a0fcc;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 11px; color: #666; letter-spacing: 2px; gap: 10px;
  }
  #loading .spinner {
    width: 28px; height: 28px; border: 2px solid #222; border-top-color: #ff3c3c;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="header">
  <h1>⬡ Laser Turret</h1>
  <div>
    <span id="status-dot"></span>
    <span id="status-label">OFFLINE</span>
  </div>
</div>

<div id="setup-panel">
  <div class="field-row">
    <label>ESP IP</label>
    <input id="esp-ip" type="text" placeholder="192.168.1.xxx" value="192.168.1.100">
  </div>
  <div class="field-row">
    <label>PORT</label>
    <input id="esp-port" type="number" placeholder="80" value="80">
  </div>
  <button id="connect-btn" onclick="testConnection()">Test Connection</button>
</div>

<div id="viewport">
  <video id="camera" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="crosshair"></div>
  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-text">LOADING HAND TRACKING…</span>
  </div>
</div>

<div id="infobar">
  <div class="info-cell"><span class="val" id="val-sx">—</span><span class="lbl">Servo X°</span></div>
  <div class="info-cell"><span class="val" id="val-sy">—</span><span class="lbl">Servo Y°</span></div>
  <div class="info-cell"><span class="val" id="val-fps">0</span><span class="lbl">FPS</span></div>
  <div class="info-cell"><span class="val" id="val-sent">0</span><span class="lbl">Sent</span></div>
</div>

<div id="controls">
  <div class="ctrl-card">
    <h3>Servo Range</h3>
    <div class="slider-row">
      <label>X</label>
      <input type="range" id="range-x" min="10" max="170" value="170" oninput="updateRanges()">
      <span id="lbl-rx">170°</span>
    </div>
    <div class="slider-row">
      <label>Y</label>
      <input type="range" id="range-y" min="10" max="90" value="60" oninput="updateRanges()">
      <span id="lbl-ry">60°</span>
    </div>
  </div>
  <div class="ctrl-card">
    <h3>Tracking</h3>
    <div class="slider-row">
      <label>Smooth</label>
      <input type="range" id="smooth" min="1" max="10" value="4" oninput="updateSmooth()">
      <span id="lbl-sm">4</span>
    </div>
    <div class="slider-row">
      <label>Point</label>
      <select id="finger-select" style="flex:1;background:#111120;border:1px solid #222240;color:#e0e0e0;padding:5px;font-family:monospace;font-size:11px;border-radius:4px;">
        <option value="8">Index tip</option>
        <option value="4">Thumb tip</option>
        <option value="12">Middle tip</option>
        <option value="0">Palm base</option>
      </select>
    </div>
    <button id="laser-toggle" onclick="toggleLaser()">LASER ON</button>
  </div>
  <button id="start-btn" onclick="toggleTracking()">▶ START TRACKING</button>
</div>

<div id="log"></div>

<!-- MediaPipe via jsDelivr (most reliable CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let handsModel = null;
let mpCamera = null;
let tracking = false;
let laserOn = true;
let connected = false;

let smoothX = 90, smoothY = 45;
let smoothFactor = 0.4;
let sentCount = 0;
let lastSendTime = 0;
const SEND_INTERVAL = 50;

let frameCount = 0, lastFpsTime = Date.now();
let rangeX = 170, rangeY = 60;

const video  = document.getElementById('camera');
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
const cross  = document.getElementById('crosshair');

// ── Logging ───────────────────────────────────────────────────────────────────
function log(msg, type='inf') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = type;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  if (el.children.length > 50) el.removeChild(el.firstChild);
}

function setStatus(state, label) {
  document.getElementById('status-dot').className = state;
  document.getElementById('status-label').textContent = label;
}

function updateRanges() {
  rangeX = parseInt(document.getElementById('range-x').value);
  rangeY = parseInt(document.getElementById('range-y').value);
  document.getElementById('lbl-rx').textContent = rangeX + '°';
  document.getElementById('lbl-ry').textContent = rangeY + '°';
}

function updateSmooth() {
  const v = parseInt(document.getElementById('smooth').value);
  document.getElementById('lbl-sm').textContent = v;
  smoothFactor = v / 10;
}

function toggleLaser() {
  laserOn = !laserOn;
  const btn = document.getElementById('laser-toggle');
  btn.textContent = laserOn ? 'LASER ON' : 'LASER OFF';
  btn.className = laserOn ? 'on' : '';
  sendCommand(Math.round(smoothX), Math.round(smoothY), laserOn);
}

// ── Connection ─────────────────────────────────────────────────────────────────
function getBaseUrl() {
  const ip   = document.getElementById('esp-ip').value.trim();
  const port = document.getElementById('esp-port').value.trim();
  return `http://${ip}:${port}`;
}

async function testConnection() {
  const btn = document.getElementById('connect-btn');
  btn.disabled = true;
  btn.textContent = 'TESTING…';
  log('Testing connection to ESP32…');
  try {
    const r = await fetch(getBaseUrl() + '/ping', { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      connected = true;
      setStatus('connected', 'CONNECTED');
      log('ESP32 responded OK!', 'ok');
      btn.textContent = '✓ CONNECTED';
    } else { throw new Error('HTTP ' + r.status); }
  } catch(e) {
    try {
      await fetch(getBaseUrl() + '/move?x=90&y=45&laser=1', { signal: AbortSignal.timeout(3000) });
      connected = true;
      setStatus('connected', 'CONNECTED');
      log('ESP32 connected!', 'ok');
      btn.textContent = '✓ CONNECTED';
    } catch(e2) {
      connected = false;
      setStatus('error', 'NO RESPONSE');
      log('Cannot reach ESP32: check IP and WiFi', 'err');
      btn.textContent = 'RETRY';
    }
  }
  btn.disabled = false;
}

async function sendCommand(x, y, laser) {
  if (!connected) return;
  const now = Date.now();
  if (now - lastSendTime < SEND_INTERVAL) return;
  lastSendTime = now;
  try {
    await fetch(`${getBaseUrl()}/move?x=${x}&y=${y}&laser=${laser?1:0}`, { signal: AbortSignal.timeout(200) });
    sentCount++;
    document.getElementById('val-sent').textContent = sentCount;
  } catch(e) { /* silent */ }
}

// ── MediaPipe init ────────────────────────────────────────────────────────────
function initMediaPipe() {
  log('Initializing hand tracking…');

  // Wait for scripts to load
  if (typeof Hands === 'undefined') {
    document.getElementById('loading-text').textContent = 'FAILED — Check internet connection';
    document.querySelector('.spinner').style.display = 'none';
    log('MediaPipe failed to load. Check your internet.', 'err');
    return;
  }

  handsModel = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  handsModel.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6,
  });

  handsModel.onResults(onResults);

  handsModel.initialize().then(() => {
    document.getElementById('loading').style.display = 'none';
    log('Hand tracking ready ✓', 'ok');
  }).catch(err => {
    document.getElementById('loading-text').textContent = 'FAILED TO INITIALIZE';
    document.querySelector('.spinner').style.display = 'none';
    log('Init error: ' + err, 'err');
  });
}

// ── Tracking toggle ────────────────────────────────────────────────────────────
async function toggleTracking() {
  const btn = document.getElementById('start-btn');

  if (!tracking) {
    if (!handsModel) { log('Hand tracking not ready yet', 'err'); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;

      mpCamera = new Camera(video, {
        onFrame: async () => {
          if (!tracking) return;
          await handsModel.send({ image: video });
          frameCount++;
          const now = Date.now();
          if (now - lastFpsTime >= 1000) {
            document.getElementById('val-fps').textContent = frameCount;
            frameCount = 0;
            lastFpsTime = now;
          }
        },
        width: 640, height: 480
      });

      mpCamera.start();
      tracking = true;
      btn.textContent = '■ STOP TRACKING';
      btn.className = 'active';
      setStatus('tracking', 'TRACKING');
      log('Camera started ✓', 'ok');
    } catch(e) {
      log('Camera error: ' + e.message, 'err');
    }
  } else {
    tracking = false;
    if (mpCamera) { mpCamera.stop(); mpCamera = null; }
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    cross.style.display = 'none';
    btn.textContent = '▶ START TRACKING';
    btn.className = '';
    setStatus(connected ? 'connected' : '', connected ? 'CONNECTED' : 'OFFLINE');
    log('Tracking stopped');
  }
}

// ── Hand results ───────────────────────────────────────────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];

function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    cross.style.display = 'none';
    return;
  }

  const lm  = results.multiHandLandmarks[0];
  const idx = parseInt(document.getElementById('finger-select').value);
  const tip = lm[idx];

  // Draw skeleton
  ctx.strokeStyle = 'rgba(255,60,60,0.4)';
  ctx.lineWidth = 1.5;
  for (const [a,b] of CONNECTIONS) {
    ctx.beginPath();
    ctx.moveTo(lm[a].x * canvas.width, lm[a].y * canvas.height);
    ctx.lineTo(lm[b].x * canvas.width, lm[b].y * canvas.height);
    ctx.stroke();
  }
  for (const p of lm) {
    ctx.beginPath();
    ctx.arc(p.x * canvas.width, p.y * canvas.height, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,60,60,0.6)';
    ctx.fill();
  }

  // Target dot
  const px = tip.x * canvas.width;
  const py = tip.y * canvas.height;
  ctx.beginPath();
  ctx.arc(px, py, 10, 0, Math.PI*2);
  ctx.strokeStyle = '#ff3c3c';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(px, py, 3, 0, Math.PI*2);
  ctx.fillStyle = '#ff3c3c';
  ctx.fill();

  // Crosshair position (accounting for CSS mirror)
  const vRect = video.getBoundingClientRect();
  cross.style.left = ((1 - tip.x) * vRect.width + vRect.left) + 'px';
  cross.style.top  = (tip.y * vRect.height + vRect.top) + 'px';
  cross.style.display = 'block';

  // Map to servo angles
  const targetX = (1 - tip.x) * rangeX;
  const targetY = tip.y * rangeY + (90 - rangeY / 2);
  smoothX += (targetX - smoothX) * smoothFactor;
  smoothY += (targetY - smoothY) * smoothFactor;

  const sx = Math.round(Math.max(0, Math.min(180, smoothX)));
  const sy = Math.round(Math.max(0, Math.min(180, smoothY)));

  document.getElementById('val-sx').textContent = sx;
  document.getElementById('val-sy').textContent = sy;
  sendCommand(sx, sy, laserOn);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Give CDN scripts a moment then init
  setTimeout(initMediaPipe, 500);
  updateRanges();
});
</script>
</body>
</html>
