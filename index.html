<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Laser Turret Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Courier New', monospace; min-height: 100vh; overflow-x: hidden; }
  #header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #0d0d14; border-bottom: 1px solid #1a1a2e; }
  #header h1 { font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #ff3c3c; }
  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; display: inline-block; margin-right: 8px; transition: background 0.3s; }
  #status-dot.connected { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
  #status-dot.tracking  { background: #ff3c3c; box-shadow: 0 0 8px #ff3c3c; }
  #status-dot.error     { background: #ff8800; }
  #status-label { font-size: 11px; color: #666; letter-spacing: 1px; }
  #setup-panel { padding: 16px; background: #0d0d14; border-bottom: 1px solid #1a1a2e; }
  .field-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .field-row label { font-size: 11px; color: #666; letter-spacing: 1px; min-width: 70px; }
  .field-row input { flex: 1; background: #111120; border: 1px solid #222240; color: #e0e0e0; padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 13px; border-radius: 4px; outline: none; }
  .field-row input:focus { border-color: #ff3c3c; }
  #connect-btn { width: 100%; padding: 10px; background: #ff3c3c; color: #0a0a0f; border: none; font-family: 'Courier New', monospace; font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; cursor: pointer; }
  #connect-btn:disabled { opacity: 0.4; }
  #viewport { position: relative; width: 100%; background: #000; }
  #camera { width: 100%; display: block; transform: scaleX(-1); }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
  #loading { position: absolute; inset: 0; background: #0a0a0fdd; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  #loading .spinner { width: 32px; height: 32px; border: 3px solid #222; border-top-color: #ff3c3c; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 11px; color: #888; letter-spacing: 2px; text-align: center; padding: 0 20px; }
  #infobar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #1a1a2e; }
  .info-cell { background: #0d0d14; padding: 10px 6px; text-align: center; }
  .info-cell .val { font-size: 18px; font-weight: 700; color: #ff3c3c; display: block; line-height: 1; }
  .info-cell .lbl { font-size: 9px; color: #444; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; display: block; }
  #controls { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ctrl-card { background: #0d0d14; border: 1px solid #1a1a2e; border-radius: 6px; padding: 12px; }
  .ctrl-card h3 { font-size: 9px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .slider-row label { font-size: 10px; color: #666; min-width: 16px; }
  .slider-row input[type=range] { flex: 1; accent-color: #ff3c3c; }
  .slider-row span { font-size: 11px; color: #e0e0e0; min-width: 28px; text-align: right; }
  #laser-toggle { width: 100%; padding: 9px; background: #111120; border: 1px solid #ff3c3c; color: #ff3c3c; font-family: 'Courier New', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; border-radius: 4px; cursor: pointer; margin-top: 4px; }
  #laser-toggle.on { background: #ff3c3c; color: #0a0a0f; }
  #start-btn { grid-column: span 2; padding: 13px; background: #111120; border: 1px solid #333360; color: #8888cc; font-family: 'Courier New', monospace; font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; cursor: pointer; }
  #start-btn.active { background: #ff3c3c22; border-color: #ff3c3c; color: #ff3c3c; }
  #log { margin: 0 16px 16px; background: #0d0d14; border: 1px solid #1a1a2e; border-radius: 6px; padding: 10px; font-size: 10px; color: #444; height: 80px; overflow-y: auto; line-height: 1.7; }
  #log .ok  { color: #00ff88; }
  #log .err { color: #ff8800; }
  #log .inf { color: #6666cc; }
</style>
</head>
<body>

<div id="header">
  <h1>⬡ Laser Turret</h1>
  <div><span id="status-dot"></span><span id="status-label">OFFLINE</span></div>
</div>

<div id="setup-panel">
  <div class="field-row">
    <label>ESP IP</label>
    <input id="esp-ip" type="text" placeholder="192.168.1.xxx" value="192.168.1.100">
  </div>
  <div class="field-row">
    <label>PORT</label>
    <input id="esp-port" type="number" value="80">
  </div>
  <button id="connect-btn" onclick="testConnection()">Test Connection</button>
</div>

<div id="viewport">
  <video id="camera" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">LOADING HAND TRACKING…</div>
  </div>
</div>

<div id="infobar">
  <div class="info-cell"><span class="val" id="val-sx">—</span><span class="lbl">Servo X°</span></div>
  <div class="info-cell"><span class="val" id="val-sy">—</span><span class="lbl">Servo Y°</span></div>
  <div class="info-cell"><span class="val" id="val-fps">0</span><span class="lbl">FPS</span></div>
  <div class="info-cell"><span class="val" id="val-sent">0</span><span class="lbl">Sent</span></div>
</div>

<div id="controls">
  <div class="ctrl-card">
    <h3>Servo Range</h3>
    <div class="slider-row">
      <label>X</label>
      <input type="range" id="range-x" min="10" max="170" value="170" oninput="updateRanges()">
      <span id="lbl-rx">170°</span>
    </div>
    <div class="slider-row">
      <label>Y</label>
      <input type="range" id="range-y" min="10" max="90" value="60" oninput="updateRanges()">
      <span id="lbl-ry">60°</span>
    </div>
  </div>
  <div class="ctrl-card">
    <h3>Tracking</h3>
    <div class="slider-row">
      <label>Smooth</label>
      <input type="range" id="smooth" min="1" max="10" value="4" oninput="updateSmooth()">
      <span id="lbl-sm">4</span>
    </div>
    <div class="slider-row">
      <label>Point</label>
      <select id="finger-select" style="flex:1;background:#111120;border:1px solid #222240;color:#e0e0e0;padding:5px;font-family:monospace;font-size:11px;border-radius:4px;">
        <option value="8">Index tip</option>
        <option value="4">Thumb tip</option>
        <option value="12">Middle tip</option>
        <option value="0">Palm base</option>
      </select>
    </div>
    <button id="laser-toggle" onclick="toggleLaser()">LASER ON</button>
  </div>
  <button id="start-btn" onclick="toggleTracking()">▶ START TRACKING</button>
</div>

<div id="log"></div>

<script type="module">
// Use the NEW MediaPipe Tasks Vision API which loads from unpkg — most reliable
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── State ─────────────────────────────────────────────────────────────────────
let handLandmarker = null;
let tracking = false;
let laserOn = true;
let connected = false;
let smoothX = 90, smoothY = 45;
let smoothFactor = 0.4;
let sentCount = 0;
let lastSendTime = 0;
let rangeX = 170, rangeY = 60;
let frameCount = 0, lastFpsTime = Date.now(), fps = 0;
let animId = null;

const video  = document.getElementById('camera');
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');

// ── Log ───────────────────────────────────────────────────────────────────────
function log(msg, type='inf') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = type;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  if (el.children.length > 60) el.removeChild(el.firstChild);
}

function setStatus(cls, label) {
  document.getElementById('status-dot').className = cls;
  document.getElementById('status-label').textContent = label;
}

// ── UI ────────────────────────────────────────────────────────────────────────
window.updateRanges = () => {
  rangeX = +document.getElementById('range-x').value;
  rangeY = +document.getElementById('range-y').value;
  document.getElementById('lbl-rx').textContent = rangeX + '°';
  document.getElementById('lbl-ry').textContent = rangeY + '°';
};

window.updateSmooth = () => {
  const v = +document.getElementById('smooth').value;
  document.getElementById('lbl-sm').textContent = v;
  smoothFactor = v / 10;
};

window.toggleLaser = () => {
  laserOn = !laserOn;
  const btn = document.getElementById('laser-toggle');
  btn.textContent = laserOn ? 'LASER ON' : 'LASER OFF';
  btn.className = laserOn ? 'on' : '';
  sendCmd(Math.round(smoothX), Math.round(smoothY), laserOn);
};

// ── Connection ────────────────────────────────────────────────────────────────
function baseUrl() {
  const ip = document.getElementById('esp-ip').value.trim();
  const p  = document.getElementById('esp-port').value.trim();
  return `http://${ip}:${p}`;
}

window.testConnection = async () => {
  const btn = document.getElementById('connect-btn');
  btn.disabled = true; btn.textContent = 'TESTING…';
  log('Testing ESP32 connection…');
  try {
    const r = await fetch(baseUrl() + '/ping', { signal: AbortSignal.timeout(3000) });
    connected = true; setStatus('connected','CONNECTED');
    log('ESP32 connected!', 'ok'); btn.textContent = '✓ CONNECTED';
  } catch {
    try {
      await fetch(baseUrl() + '/move?x=90&y=45&laser=1', { signal: AbortSignal.timeout(3000) });
      connected = true; setStatus('connected','CONNECTED');
      log('ESP32 connected!', 'ok'); btn.textContent = '✓ CONNECTED';
    } catch(e) {
      connected = false; setStatus('error','NO RESPONSE');
      log('Cannot reach ESP32 — check IP', 'err'); btn.textContent = 'RETRY';
    }
  }
  btn.disabled = false;
};

async function sendCmd(x, y, laser) {
  if (!connected) return;
  const now = Date.now();
  if (now - lastSendTime < 50) return;
  lastSendTime = now;
  try {
    await fetch(`${baseUrl()}/move?x=${x}&y=${y}&laser=${laser?1:0}`, { signal: AbortSignal.timeout(200) });
    sentCount++;
    document.getElementById('val-sent').textContent = sentCount;
  } catch {}
}

// ── MediaPipe Init ────────────────────────────────────────────────────────────
async function initMP() {
  log('Loading MediaPipe Tasks Vision…');
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1
    });
    document.getElementById('loading').style.display = 'none';
    log('Hand tracking ready ✓', 'ok');
  } catch(e) {
    // Try CPU fallback
    try {
      log('GPU failed, trying CPU…', 'err');
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "CPU"
        },
        runningMode: "VIDEO",
        numHands: 1
      });
      document.getElementById('loading').style.display = 'none';
      log('Hand tracking ready (CPU) ✓', 'ok');
    } catch(e2) {
      document.getElementById('loading-text').textContent = 'FAILED: ' + e2.message;
      document.querySelector('.spinner').style.display = 'none';
      log('MediaPipe failed: ' + e2.message, 'err');
    }
  }
}

// ── Tracking ──────────────────────────────────────────────────────────────────
window.toggleTracking = async () => {
  const btn = document.getElementById('start-btn');
  if (!tracking) {
    if (!handLandmarker) { log('Still loading…', 'err'); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      tracking = true;
      btn.textContent = '■ STOP TRACKING';
      btn.className = 'active';
      setStatus('tracking', 'TRACKING');
      log('Tracking started ✓', 'ok');
      processFrame();
    } catch(e) { log('Camera error: ' + e.message, 'err'); }
  } else {
    tracking = false;
    if (animId) cancelAnimationFrame(animId);
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    btn.textContent = '▶ START TRACKING';
    btn.className = '';
    setStatus(connected ? 'connected' : '', connected ? 'CONNECTED' : 'OFFLINE');
    log('Tracking stopped');
  }
};

// ── Frame loop ────────────────────────────────────────────────────────────────
const CONN = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];

let lastVideoTime = -1;

function processFrame() {
  if (!tracking) return;
  animId = requestAnimationFrame(processFrame);

  if (video.readyState < 2) return;
  if (video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;

  const results = handLandmarker.detectForVideo(video, Date.now());

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  frameCount++;
  const now = Date.now();
  if (now - lastFpsTime >= 1000) {
    fps = frameCount; frameCount = 0; lastFpsTime = now;
    document.getElementById('val-fps').textContent = fps;
  }

  if (!results.landmarks || results.landmarks.length === 0) return;

  const lm  = results.landmarks[0];
  const idx = +document.getElementById('finger-select').value;
  const tip = lm[idx];

  // Skeleton
  ctx.strokeStyle = 'rgba(255,60,60,0.45)';
  ctx.lineWidth = 1.5;
  for (const [a,b] of CONN) {
    ctx.beginPath();
    ctx.moveTo(lm[a].x * canvas.width, lm[a].y * canvas.height);
    ctx.lineTo(lm[b].x * canvas.width, lm[b].y * canvas.height);
    ctx.stroke();
  }
  for (const p of lm) {
    ctx.beginPath();
    ctx.arc(p.x * canvas.width, p.y * canvas.height, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,60,60,0.6)';
    ctx.fill();
  }

  // Target circle
  const px = tip.x * canvas.width;
  const py = tip.y * canvas.height;
  ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI*2);
  ctx.strokeStyle = '#ff3c3c'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2);
  ctx.fillStyle = '#ff3c3c'; ctx.fill();

  // Servo mapping
  const tx = (1 - tip.x) * rangeX;
  const ty = tip.y * rangeY + (90 - rangeY / 2);
  smoothX += (tx - smoothX) * smoothFactor;
  smoothY += (ty - smoothY) * smoothFactor;
  const sx = Math.round(Math.max(0, Math.min(180, smoothX)));
  const sy = Math.round(Math.max(0, Math.min(180, smoothY)));

  document.getElementById('val-sx').textContent = sx;
  document.getElementById('val-sy').textContent = sy;
  sendCmd(sx, sy, laserOn);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
updateRanges();
initMP();
</script>
</body>
</html>
